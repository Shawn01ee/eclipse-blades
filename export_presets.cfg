custom_template/debug=""
custom_template/release=""
variant/extensions_support=false
variant/thread_support=false
vram_texture_compression/for_desktop=true
vram_texture_compression/for_mobile=false
html/export_icon=true
html/custom_html_shell=""
html/head_include="<meta name=\"viewport\" content=\"width=device-width,user-scalable=no,initial-scale=1.0,viewport-fit=cover\"><meta name=\"theme-color\" content=\"#1c1a16\"><meta name=\"apple-mobile-web-app-capable\" content=\"yes\"><meta name=\"apple-mobile-web-app-status-bar-style\" content=\"black-translucent\"><style>html,body{width:100%;height:100%;min-height:100dvh;overscroll-behavior:none;background-color:#d8ceb6}#status-progress{accent-color:#a83525}</style><script>(()=>{const mobile=matchMedia('(pointer:coarse)').matches||navigator.maxTouchPoints>0;if(!mobile)return;let entering=false;async function enterMobileMode(){if(entering)return;entering=true;const root=document.documentElement;try{if(!document.fullscreenElement){if(root.requestFullscreen)await root.requestFullscreen();else if(root.webkitRequestFullscreen)await root.webkitRequestFullscreen()}}catch(_e){}try{if(screen.orientation&&screen.orientation.lock)await screen.orientation.lock('landscape')}catch(_e){}setTimeout(()=>scrollTo(0,1),50)}addEventListener('pointerdown',enterMobileMode,{capture:true,once:true});addEventListener('touchstart',enterMobileMode,{capture:true,passive:true,once:true});addEventListener('orientationchange',()=>setTimeout(()=>scrollTo(0,1),50));})();</script>"
