html/custom_html_shell=""
html/head_include="<meta name=\"viewport\" content=\"width=device-width,user-scalable=no,initial-scale=1.0,viewport-fit=cover\"><meta name=\"theme-color\" content=\"#1c1a16\"><meta name=\"apple-mobile-web-app-capable\" content=\"yes\"><meta name=\"apple-mobile-web-app-status-bar-style\" content=\"black-translucent\"><style>html,body{width:100%;height:100%;min-height:100dvh;overscroll-behavior:none;background-color:#d8ceb6}html:fullscreen,html:fullscreen body,html:fullscreen #canvas{width:100%;height:100%}#status-progress{accent-color:#a83525}</style><script>(()=>{const mobile=matchMedia('(pointer:coarse)').matches||navigator.maxTouchPoints>0;if(!mobile)return;const standalone=navigator.standalone===true||matchMedia('(display-mode:fullscreen)').matches||matchMedia('(display-mode:standalone)').matches;let entering=false;const fit=()=>setTimeout(()=>{scrollTo(0,1);dispatchEvent(new Event('resize'))},80);async function enterMobileMode(){const root=document.documentElement;const active=document.fullscreenElement||document.webkitFullscreenElement;if(entering||active||standalone)return;const request=root.requestFullscreen||root.webkitRequestFullscreen;if(!request)return;entering=true;let entered=false;try{await request.call(root);entered=true}catch(_e){}if(entered){try{if(screen.orientation&&screen.orientation.lock)await screen.orientation.lock('landscape')}catch(_e){}fit()}entering=false}addEventListener('pointerdown',enterMobileMode,{capture:true});addEventListener('touchstart',enterMobileMode,{capture:true,passive:true});addEventListener('click',enterMobileMode,{capture:true});addEventListener('fullscreenchange',fit);addEventListener('webkitfullscreenchange',fit);addEventListener('orientationchange',fit);})();</script>"
